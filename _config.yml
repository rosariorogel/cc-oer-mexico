# --- Required options --- #

url: "https://rosariorogel.net"
baseurl: "/cc-oer-mexico"

title: "El conocimiento en abierto: guía práctica sobre licencias Creative Commons"
author: author: "Rosario Rogel-Salazar · Recurso Educativo Abierto"

# --- Logo --- #

#avatar: "/assets/img/CC_Flor.png"
#round-avatar: true

# --- Footer social media links --- #

social-network-links:
  email: "rosariorogel@uaemex.mx"
  youtube: "@RosarioRogel"
  linkedin: "https://www.linkedin.com/in/rosariorogel/" 
  ORCID: "0000-0002-6018-0635"
  google-scholar: "https://scholar.google.com.mx/citations?user=t5jxiy0AAAAJ&hl=es"

rss-description: "Guía práctica sobre licencias Creative Commons, atribución TASL, excepciones y limitaciones, y elección de licencias abiertas en el contexto mexicano."

# --- General options --- #

share-links-active:
  twitter: false
  facebook: false
  linkedin: false
  vk: false

url-pretty: "rosariorogel.net/cc-oer-mexico"

excerpt_length: 50
feed_show_excerpt: false
feed_show_tags: false
post_search: false

# --- Colours / background image --- #

navbar-col: "#EAEAEA"
navbar-text-col: "#404040"
navbar-border-col: "#DDDDDD"
page-col: "#FFFFFF"
text-col: "#404040"
link-col: "#008AFF"
hover-col: "#0085A1"
footer-col: "#EAEAEA"
footer-text-col: "#777777"
footer-link-col: "#404040"

# --- Misc --- #

date_format: "%B %-d, %Y"

# --- Output options --- #

timezone: "America/Mexico_City"
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate: 5

kramdown:
  input: GFM

# --- Default YAML values --- #

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      comments: false
      social-share: false
  - scope:
      path: ""
    values:
      layout: "page"

# --- Exclude these files from production site --- #

exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap

favicon: "/favicon.ico"

site-css:
  - "/assets/css/custom.css"
  
